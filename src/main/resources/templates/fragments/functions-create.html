<div xmlns:th="http://www.thymeleaf.org">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>New Function</h3>
    </div>

    <form method="post" th:action="@{/functions/new}">
        <div class="mb-3">
            <label class="form-label">Definition (CREATE OR REPLACE FUNCTION ...)</label>
            <textarea name="definition" class="form-control sql-editor" rows="40">
CREATE OR REPLACE FUNCTION public.my_function()
RETURNS void
LANGUAGE plpgsql
AS $function$
BEGIN
    -- TODO: implemente a lógica aqui

END;
$function$
            </textarea>
        </div>

        <div class="d-flex justify-content-between">
            <a class="btn btn-outline-secondary btn-sm" th:href="@{/functions}">Back</a>
            <button class="btn btn-primary btn-sm" type="submit">Create</button>
        </div>

        <p class="text-muted mt-2 small">
            Cole ou escreva aqui o SQL completo da função.
            O comando será enviado como está para o banco.
        </p>
    </form>
</div>
