<div xmlns:th="http://www.thymeleaf.org">
    <div class="fw-bold text-uppercase small text-muted px-2 mb-1">
        Schemas
    </div>

    <!-- Create schema -->
    <form class="px-2 mb-2 d-flex align-items-center gap-1" method="post" th:action="@{/schemas/schema/create}">
        <input type="text"
               name="name"
               class="form-control form-control-sm"
               placeholder="new_schema">
        <button class="btn btn-primary btn-sm" type="submit">Create</button>
    </form>

    <div class="accordion accordion-flush" id="schemaMenu">
        <div class="accordion-item" th:each="schema : ${schemaItems}">
            <h2 class="accordion-header d-flex align-items-center">
                <button
                        class="accordion-button py-2 flex-grow-1"
                        type="button"
                        data-bs-toggle="collapse"
                        th:data-bs-target="'#schema-' + ${schema.name}">
                    <span th:text="${schema.name}">public</span>
                </button>
            </h2>

              <div class="accordion-collapse collapse show"
                  th:id="'schema-' + ${schema.name}">

                <div class="px-2 py-1 d-flex flex-column gap-1 border-bottom small">
                    <div class="d-flex justify-content-end gap-1">
                    <form method="post" th:action="@{/schemas/schema/rename}" class="d-flex align-items-center gap-1">
                        <input type="hidden" name="oldName" th:value="${schema.name}">
                        <input type="text" name="newName" class="form-control form-control-sm" style="width: 120px;"
                               th:placeholder="'Rename ' + ${schema.name}">
                        <button class="btn btn-outline-secondary btn-sm" type="submit" title="Rename schema">Ren</button>
                    </form>
                    <form method="post" th:action="@{/schemas/schema/delete}"
                          onsubmit="return confirm('Delete schema and all objects? (uses CASCADE)');">
                        <input type="hidden" name="name" th:value="${schema.name}">
                        <input type="hidden" name="cascade" value="true">
                        <button class="btn btn-outline-danger btn-sm" type="submit" title="Delete schema">Del</button>
                    </form>
                    </div>
                    <form method="post" th:action="@{/schemas/table/create}"
                          class="d-flex align-items-center gap-1 justify-content-end">
                        <input type="hidden" name="schema" th:value="${schema.name}">
                        <input type="text" name="name" class="form-control form-control-sm" style="width: 140px;"
                               placeholder="new_table">
                        <select name="idStrategy" class="form-select form-select-sm" style="width: 145px;" title="ID strategy">
                            <option value="serial" selected>id serial</option>
                            <option value="bigserial">id bigserial</option>
                            <option value="int_identity">id int identity</option>
                            <option value="bigint_identity">id bigint identity</option>
                            <option value="uuid">id uuid</option>
                            <option value="none">without id</option>
                        </select>
                        <button class="btn btn-outline-primary btn-sm" type="submit" title="Create table">New</button>
                    </form>
                </div>

                <div class="list-group list-group-flush">
                    <a class="list-group-item list-group-item-action py-1"
                       th:each="tableName : ${schema.tables}"
                       th:text="${tableName}"
                       th:href="@{/schemas(schema=${schema.name}, table=${tableName})}"
                       th:classappend="${tableName == selectedTable} ? ' active'">
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
