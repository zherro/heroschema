<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>HeroSchema</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- jQuery + Select2 for searchable selects (used in FK selectors) -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <!-- CodeMirror (SQL editor) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/theme/material.min.css">
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/sql/sql.min.js"></script>

    <style>
        .CodeMirror {
            height: 70vh;
        }

        /* Ajustes visuais para Select2 com tema Bootstrap 5, alinhado com form-select-sm */
        .select2-container--bootstrap-5 .select2-selection--single {
            height: calc(1.5em + .5rem + 2px);
            padding: 0.125rem 0.5rem;
            font-size: .875rem;
            line-height: 1.5;
        }

        .select2-container--bootstrap-5 .select2-selection--single .select2-selection__rendered {
            padding-right: 1.5rem;
            padding-left: 0;
        }

        .select2-container--bootstrap-5 .select2-selection--single .select2-selection__arrow {
            height: 100%;
            right: 0.25rem;
        }

        .select2-container--bootstrap-5 .select2-selection {
            border-radius: 0.2rem;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<div th:replace="fragments/header :: header"></div>

<!-- BODY -->
<div class="container-fluid">
    <div class="row vh-100">

        <!-- SIDEBAR (opcional) -->
        <aside class="col-3 border-end p-3" th:if="${sidebar} != null">
            <div th:replace="~{${sidebar}}"></div>
        </aside>

        <!-- MAIN -->
        <main class="p-4" th:class="${sidebar} != null ? 'col-9 p-4' : 'col-12 p-4'">
            <div th:if="${message} != null" class="alert alert-success py-2 px-3 small mb-3">
                <span th:text="${message}"></span>
            </div>
            <div th:if="${error} != null" class="alert alert-danger py-2 px-3 small mb-3">
                <span th:text="${error}"></span>
            </div>
            <div th:replace="~{${content}}"></div>
        </main>

    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        if (window.CodeMirror) {
            document.querySelectorAll('textarea.sql-editor').forEach(function (ta) {
                var cm = CodeMirror.fromTextArea(ta, {
                    mode: 'text/x-sql',
                    lineNumbers: true,
                    theme: 'material',
                    viewportMargin: Infinity
                });
                // Keep a direct reference for custom sync routines.
                ta.__cm = cm;
            });
        }

        // Helper: suggested defaults per type
        function isBooleanType(t) {
            if (!t) return false;
            t = t.toLowerCase();
            return t.indexOf('bool') !== -1;
        }

        function isTimestampType(t) {
            if (!t) return false;
            t = t.toLowerCase();
            return t.indexOf('timestamp') !== -1 || t.indexOf('date') !== -1 || t.indexOf('time') !== -1;
        }

        function isNumericType(t) {
            if (!t) return false;
            t = t.toLowerCase();
            return t.indexOf('int') !== -1 || t.indexOf('numeric') !== -1 || t.indexOf('decimal') !== -1 || t.indexOf('double') !== -1 || t.indexOf('real') !== -1;
        }

        // When clicking on a default suggestion, fill the default input according to column type
        document.body.addEventListener('click', function (e) {
            var target = e.target;
            if (!target.classList.contains('default-suggestion')) {
                return;
            }

            var kind = target.getAttribute('data-default-kind');
            var explicit = target.getAttribute('data-default-value');

            var tr = target.closest('tr');
            if (!tr) return;

            var typeSelect = tr.querySelector('select[name$=".type"]');
            var defaultInput = tr.querySelector('input[name$=".defaultValue"]');
            if (!defaultInput) return;

            var type = typeSelect ? typeSelect.value : '';
            var value = explicit;

            if (!value) {
                if (kind === 'timestamp') {
                    value = 'CURRENT_TIMESTAMP';
                } else if (kind === 'boolean') {
                    value = isBooleanType(type) ? 'true' : 'true';
                } else if (kind === 'numeric') {
                    value = isNumericType(type) ? '0' : '0';
                } else if (kind === 'text') {
                    value = "''";
                }
            }

            if (value) {
                defaultInput.value = value;
            }
        });

        // Initialize searchable selects for FK (schema/table/column)
        function refreshFkVisibility(scope) {
            var $scope = scope ? jQuery(scope) : jQuery(document);
            var $rows = $scope.is('tr') ? $scope : $scope.find('tr');
            $rows.each(function () {
                var $tr = jQuery(this);
                var checked = $tr.find('.fk-toggle').is(':checked');
                var $config = $tr.find('.fk-config');
                if (!$config.length) return;
                $config.toggleClass('d-none', !checked);
            });
        }

        function initFkSelects() {
            if (!window.jQuery) {
                return;
            }

            function loadFkSchemas(callback) {
                if (Array.isArray(window.__fkSchemasCache)) {
                    callback(window.__fkSchemasCache);
                    return;
                }

                jQuery.getJSON('/schemas/fk/schemas')
                    .done(function (data) {
                        window.__fkSchemasCache = Array.isArray(data) ? data : [];
                        callback(window.__fkSchemasCache);
                    })
                    .fail(function () {
                        callback([]);
                    });
            }

            function populateSchemaSelects(schemas) {
                jQuery('.fk-schema-select').each(function () {
                    var $schemaSel = jQuery(this);
                    var selected = $schemaSel.val();
                    var hasRealOptions = $schemaSel.find('option').length > 1;
                    if (hasRealOptions) {
                        return;
                    }

                    $schemaSel.empty().append(new Option('schema', '', false, false));
                    schemas.forEach(function (s) {
                        var isSelected = selected === s;
                        $schemaSel.append(new Option(s, s, isSelected, isSelected));
                    });
                    $schemaSel.trigger('change');
                });
            }

            loadFkSchemas(populateSchemaSelects);


            // Bind change handlers only once
            if (window.__fkHandlersInitialized) {
                return;
            }
            window.__fkHandlersInitialized = true;

            // Load tables when schema changes
            jQuery(document).on('change', '.fk-schema-select', function () {
                var $schemaSel = jQuery(this);
                var schema = $schemaSel.val();
                var $tr = $schemaSel.closest('tr');
                var $tableSel = $tr.find('.fk-table-select');
                var $columnSel = $tr.find('.fk-column-select');

                $tableSel.empty().append(new Option('table', '', false, false)).trigger('change');
                $columnSel.empty().append(new Option('column', '', false, false)).trigger('change');

                if (!schema) return;

                jQuery.getJSON('/schemas/fk/tables', {schema: schema})
                    .done(function (data) {
                        data.forEach(function (t) {
                            $tableSel.append(new Option(t, t, false, false));
                        });
                    });
            });

            // Load columns when table changes
            jQuery(document).on('change', '.fk-table-select', function () {
                var $tableSel = jQuery(this);
                var table = $tableSel.val();
                var $tr = $tableSel.closest('tr');
                var $schemaSel = $tr.find('.fk-schema-select');
                var schema = $schemaSel.val();
                var $columnSel = $tr.find('.fk-column-select');

                $columnSel.empty().append(new Option('column', '', false, false)).trigger('change');

                if (!schema || !table) return;

                jQuery.getJSON('/schemas/fk/columns', {schema: schema, table: table})
                    .done(function (data) {
                        data.forEach(function (c) {
                            $columnSel.append(new Option(c, c, false, false));
                        });
                    });
            });
        }

        initFkSelects();
        refreshFkVisibility();

        jQuery(document).on('change', '.fk-toggle', function () {
            refreshFkVisibility(jQuery(this).closest('tr'));
        });

        // New column button: clone template row and append to table body
        var addBtn = document.getElementById('add-column-btn');
        var tbody = document.getElementById('columns-body');
        var tpl = document.getElementById('column-row-template');
        if (addBtn && tbody && tpl) {
            var nextIndex = parseInt(tbody.getAttribute('data-next-index') || '0', 10);
            addBtn.addEventListener('click', function () {
                var html = tpl.textContent;
                if (!html) return;
                html = html.replace(/__INDEX__/g, String(nextIndex));
                nextIndex++;
                tbody.setAttribute('data-next-index', String(nextIndex));

                var temp = document.createElement('tbody');
                temp.innerHTML = html.trim();
                var newRow = temp.firstElementChild;
                if (newRow) {
                    tbody.appendChild(newRow);
                }

                // Re-init FK selects (Select2) and keep everything consistent
                if (typeof jQuery !== 'undefined') {
                    initFkSelects();
                    refreshFkVisibility(newRow);
                }
            });
        }

        // Index edit button: load existing index data into the "New index" form
        document.body.addEventListener('click', function (e) {
            var btn = e.target.closest && e.target.closest('.index-edit-btn');
            if (!btn) return;

            var name = btn.getAttribute('data-index-name') || '';
            var cols = btn.getAttribute('data-index-columns') || '';
            var unique = btn.getAttribute('data-index-unique') === 'true';
            var where = btn.getAttribute('data-index-where') || '';

            var nameInput = document.querySelector('input[name="newIndexName"]');
            var colsInput = document.querySelector('input[name="newIndexColumns"]');
            var uniqueInput = document.querySelector('input[name="newIndexUnique"]');
            var whereInput = document.querySelector('input[name="newIndexWhere"]');
            var editOriginalInput = document.querySelector('input[name="editIndexOriginalName"]');

            if (nameInput) nameInput.value = name;
            if (colsInput) colsInput.value = cols || '';
            if (uniqueInput) uniqueInput.checked = !!unique;
            if (whereInput) whereInput.value = where || '';
            if (editOriginalInput) editOriginalInput.value = name;
        });

        // Policy composer: keep SQL editor in sync while user edits policy fields
        function bindPolicyComposerAutoSync() {
            var form = document.getElementById('policy-composer-form');
            if (!form) return;

            var editor = form.querySelector('textarea[name="policyEditorSql"]');
            if (!editor) return;
            var usingControls = form.querySelector('.policy-using-controls');

            function val(name) {
                var el = form.querySelector('[name="' + name + '"]');
                return el ? (el.value || '').trim() : '';
            }

            function resolveTemplate(key, action, resource, tenantColumn) {
                var templates = {
                    tenant_match: tenantColumn + ' = auth.fun_auth_current_tenant_id()',
                    perm_view: "auth.fun_auth__has_permission('" + resource + "'::text, 'view'::text)",
                    perm_create: "auth.fun_auth__has_permission('" + resource + "'::text, 'create'::text)",
                    perm_update: "auth.fun_auth__has_permission('" + resource + "'::text, 'update'::text)",
                    perm_delete: "auth.fun_auth__has_permission('" + resource + "'::text, 'delete'::text)",
                    company_only: "auth.fun_tenant_type_is('COMPANY'::text)",
                    allow_true: 'true',
                    tenant_and_view: tenantColumn + " = auth.fun_auth_current_tenant_id() AND auth.fun_auth__has_permission('" + resource + "'::text, 'view'::text)",
                    tenant_create_company: tenantColumn + " = auth.fun_auth_current_tenant_id() AND auth.fun_auth__has_permission('" + resource + "'::text, 'create'::text) AND auth.fun_tenant_type_is('COMPANY'::text)"
                };

                if (key === 'action_permission') {
                    var actionPerm = action === 'INSERT' ? 'create' : action.toLowerCase();
                    return "auth.fun_auth__has_permission('" + resource + "'::text, '" + actionPerm + "'::text)";
                }

                return templates[key] || '';
            }

            function autoRenamePolicyNameFromAction() {
                var action = val('policyAction').toLowerCase();
                var table = val('table');
                var role = (val('policyRole') || 'auth_user').toLowerCase().replace(/\s+/g, '_');
                var nameInput = form.querySelector('[name="policyName"]');
                if (!nameInput || !action || !table || !role) return;

                var current = (nameInput.value || '').trim();
                if (!current) {
                    nameInput.value = action + '_' + table + '_' + role;
                    return;
                }

                var m = current.match(/^(select|insert|update|delete)_(.+?)_([a-z0-9_]+)$/i);
                if (m) {
                    nameInput.value = action + '_' + m[2] + '_' + role;
                }
            }

            function refreshPolicyFieldVisibility() {
                var action = val('policyAction').toLowerCase();
                var isInsert = action === 'insert';
                if (usingControls) {
                    usingControls.classList.toggle('d-none', isInsert);
                }
            }

            function buildSql() {
                var schema = val('schema');
                var table = val('table');
                var action = val('policyAction').toUpperCase();
                var policyName = val('policyName');
                var role = val('policyRole') || 'auth_user';
                var preset = val('policyPreset');
                var usingExpr = val('customUsingExpr');
                var withCheckExpr = val('customWithCheckExpr');

                if (!schema || !table) return '-- Fill schema/table';
                if (!policyName) return '-- Fill policy name';
                if (preset !== 'custom') return '-- Use custom mode';
                if (!usingExpr && !withCheckExpr) return '-- Fill USING and/or WITH CHECK';

                var actionsSet = {};
                actionsSet[action] = true;
                var comboSelect = form.querySelector('[name="comboSelect"]');
                var comboInsert = form.querySelector('[name="comboInsert"]');
                var comboUpdate = form.querySelector('[name="comboUpdate"]');
                var comboDelete = form.querySelector('[name="comboDelete"]');
                if (comboSelect && comboSelect.checked) actionsSet['SELECT'] = true;
                if (comboInsert && comboInsert.checked) actionsSet['INSERT'] = true;
                if (comboUpdate && comboUpdate.checked) actionsSet['UPDATE'] = true;
                if (comboDelete && comboDelete.checked) actionsSet['DELETE'] = true;

                var actions = Object.keys(actionsSet).map(function (a) { return a.toLowerCase(); });

                function policyNameForAction(base, act, total) {
                    var role = (val('policyRole') || 'auth_user').toLowerCase().replace(/\s+/g, '_');
                    var tableName = (val('table') || '').toLowerCase();

                    if (total === 1) {
                        return base;
                    }

                    return act + '_' + tableName + '_' + role;
                }

                function onePolicySql(act, name) {
                    var sql = 'CREATE POLICY ' + name + ' ON ' + schema + '.' + table + '\n' +
                        '  FOR ' + act.toUpperCase() + ' TO ' + role;
                    if (act === 'insert') {
                        if (withCheckExpr) sql += ' WITH CHECK (' + withCheckExpr + ')';
                    } else if (act === 'update') {
                        if (usingExpr) sql += ' USING (' + usingExpr + ')';
                        if (withCheckExpr) sql += ' WITH CHECK (' + withCheckExpr + ')';
                    } else {
                        if (usingExpr) sql += ' USING (' + usingExpr + ')';
                    }
                    return sql + ';';
                }

                if (actions.length === 1) {
                    return onePolicySql(actions[0], policyNameForAction(policyName, actions[0], 1));
                }

                var header = '-- Selected actions: ' + actions.map(function (a) { return a.toUpperCase(); }).join(', ');
                var statements = actions.map(function (act) {
                    return onePolicySql(act, policyNameForAction(policyName, act, actions.length));
                });
                return header + '\n' + statements.join('\n\n');
            }

            function syncEditor() {
                var nextSql = buildSql();
                if (editor.__cm) {
                    editor.__cm.setValue(nextSql);
                } else {
                    editor.value = nextSql;
                }
            }

            form.addEventListener('input', function (e) {
                var t = e.target;
                if (!t) return;
                if (t.name === 'policyEditorSql') return;
                if (t.name === 'policyAction') {
                    autoRenamePolicyNameFromAction();
                    refreshPolicyFieldVisibility();
                }
                syncEditor();
            });

            form.addEventListener('change', function (e) {
                var t = e.target;
                if (!t) return;
                if (t.name === 'policyEditorSql') return;

                if (t.name === 'policyAction') {
                    autoRenamePolicyNameFromAction();
                    refreshPolicyFieldVisibility();
                }

                if (t.classList && t.classList.contains('policy-condition-template')) {
                    var targetName = t.getAttribute('data-target');
                    var targetInput = form.querySelector('[name="' + targetName + '"]');
                    if (targetInput && t.value) {
                        var action = val('policyAction').toUpperCase();
                        var resource = val('resourceName') || 'resource';
                        var tenantColumn = val('tenantColumn') || 'tenant_id';
                        targetInput.value = resolveTemplate(t.value, action, resource, tenantColumn);
                    }
                }
                syncEditor();
            });

            // Fill initial draft only when editor is empty.
            var currentEditorValue = editor.__cm ? editor.__cm.getValue() : editor.value;
            if (!currentEditorValue || !currentEditorValue.trim()) {
                autoRenamePolicyNameFromAction();
                refreshPolicyFieldVisibility();
                syncEditor();
            } else {
                refreshPolicyFieldVisibility();
            }
        }

        bindPolicyComposerAutoSync();
    });
</script>

</body>
</html>
