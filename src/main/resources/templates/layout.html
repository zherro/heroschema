<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>HeroSchema</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- CodeMirror (SQL editor) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/theme/material.min.css">
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/sql/sql.min.js"></script>

    <style>
        .CodeMirror {
            height: 70vh;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<div th:replace="fragments/header :: header"></div>

<!-- BODY -->
<div class="container-fluid">
    <div class="row vh-100">

        <!-- SIDEBAR (opcional) -->
        <aside class="col-3 border-end p-3" th:if="${sidebar} != null">
            <div th:replace="~{${sidebar}}"></div>
        </aside>

        <!-- MAIN -->
        <main class="p-4" th:class="${sidebar} != null ? 'col-9 p-4' : 'col-12 p-4'">
            <div th:replace="~{${content}}"></div>
        </main>

    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        if (window.CodeMirror) {
            document.querySelectorAll('textarea.sql-editor').forEach(function (ta) {
                CodeMirror.fromTextArea(ta, {
                    mode: 'text/x-sql',
                    lineNumbers: true,
                    theme: 'material',
                    viewportMargin: Infinity
                });
            });
        }
    });
</script>

</body>
</html>
